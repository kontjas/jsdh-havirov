<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JSDH Havířov</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c62828">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
body { margin:0; font-family:Arial; background:#f2f2f2; }
.header { text-align:center; padding:15px; font-weight:bold; background:#c62828; color:white; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; padding:15px; }
.card { background:white; padding:20px; border-radius:15px; text-align:center; cursor:pointer; }
.back { margin:10px; padding:10px; background:#c62828; color:white; text-align:center; border-radius:10px; cursor:pointer; }
.search { margin:10px; padding:12px; width:calc(100% - 40px); border-radius:10px; border:none; font-size:16px; }

.section { background:white; margin:10px; border-radius:10px; }
.section-header { padding:15px; font-weight:bold; cursor:pointer; background:#eee; }
.section-content { display:none; padding:10px; }
.item { padding:5px 0; }

.highlight { background:yellow; font-weight:bold; }

.quick {
background:white;
margin:10px;
padding:15px;
border-radius:12px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
font-size:14px;
}
.quick div { background:#f7f7f7; padding:10px; border-radius:8px; }
</style>
</head>

<body>

<div class="header">JSDH Havířov</div>

<!-- HOME -->
<div id="home">
<div id="infoBox" class="card" style="margin:15px;"></div>

<div class="grid">
<div class="card" onclick="showPage('vozidla')">🚒 Vozidla</div>
<div class="card" onclick="showPage('sluzby')">📅 Služby</div>
<div class="card" onclick="showPage('mapa')">🗺️ Mapa výjezdu</div>
<div class="card" onclick="openHasicum()">🚨 Hasičům.CZ</div>
</div>
</div>

<!-- VOZIDLA -->
<div id="vozidla" style="display:none;">
<div class="back" onclick="goHome()">⬅ Zpět</div>

<div class="card" onclick="openCAS()">CAS 20/4000/250 S2R - HKA 701</div>
<div class="card" onclick="openDA()">DA 12 Renault - HKA 700</div>
<div class="card">VEA Škoda Yeti - HKA 702</div>
</div>

<!-- SLUŽBY -->
<div id="sluzby" style="display:none;">
<div class="back" onclick="goHome()">⬅ Zpět</div>
<iframe src="https://docs.google.com/spreadsheets/d/1YkziVkwffJxgKvp6J7__u2TVs_T3QOcyAS_QdTm_OFs/preview" style="width:100%; height:90vh; border:none;"></iframe>
</div>

<!-- MAPA -->
<div id="mapa" style="display:none;">
<div class="back" onclick="goHome()">⬅ Zpět</div>
<iframe src="https://www.google.com/maps/d/embed?mid=12aDzLFcwAqOVW47bT8uIo2bEsoE" style="width:100%; height:90vh; border:none;"></iframe>
</div>

<!-- DETAIL -->
<div id="detail" style="display:none;">
<div class="back" onclick="showPage('vozidla')">⬅ Zpět</div>
<input class="search" placeholder="🔍 Hledat..." oninput="searchText(this.value)">
<div id="content"></div>
</div>

<script>

// SERVICE WORKER
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js').then(r=>r.update());
}

// NAVIGACE
function showPage(p){
home.style.display="none";
vozidla.style.display="none";
detail.style.display="none";
sluzby.style.display="none";
mapa.style.display="none";
document.getElementById(p).style.display="block";
}
function goHome(){ showPage("home"); }

// ČAS + SMĚNA
function updateInfo(){
let now=new Date();
let start=new Date(2024,0,1);
let diff=Math.floor((now-start)/(1000*60*60*24));
let smena=["A","B","C"][diff%3];

infoBox.innerHTML=`
<div><b>${now.toLocaleTimeString("cs-CZ")}</b></div>
<div>${now.toLocaleDateString("cs-CZ")}</div>
<hr>
<div>🚒 Směna ${smena}</div>
`;
}
setInterval(updateInfo,1000);
updateInfo();

// HASIČŮM
function openHasicum(){
let ua=navigator.userAgent;
if(/android/i.test(ua)){
window.location.href="https://play.google.com/store/apps/details?id=cz.hasicum.app";
}else{
window.location.href="https://apps.apple.com/";
}
}

// RENDER
function render(data,isCAS){
let html="";

if(isCAS){
html+=`<div class="quick">
<div>💧 4000L</div>
<div>🧯 250L</div>
<div>⚡ 324kW</div>
<div>🚛 SCANIA</div>
<div>📅 2021</div>
<div>🏎️ 110km/h</div>
</div>`;
}else{
html+=`<div class="quick">
<div>⚡ 100kW</div>
<div>🔧 3.0 dCi</div>
<div>💪 320Nm</div>
<div>🚛 3500kg</div>
<div>📦 1460kg</div>
<div>📏 L2H2</div>
</div>`;
}

data.forEach((s,i)=>{
html+=`<div class="section">
<div class="section-header" onclick="toggle(${i})">${s.nazev}</div>
<div class="section-content" id="sec${i}">
${s.veci.map(v=>`<div class="item">${v}</div>`).join("")}
</div></div>`;
});

content.innerHTML=html;
}

// TOGGLE
function toggle(i){
let el=document.getElementById("sec"+i);
el.style.display=el.style.display==="block"?"none":"block";
}

// SEARCH
function searchText(text){
text=text.toLowerCase();

document.querySelectorAll(".item").forEach(el=>{
let original=el.innerText;
let lower=original.toLowerCase();

if(lower.includes(text) && text!==""){
el.style.display="block";
el.innerHTML=original.replace(new RegExp(text,"gi"),m=>`<span class="highlight">${m}</span>`);
el.closest(".section-content").style.display="block";
}else if(text===""){
el.style.display="block";
el.innerHTML=original;
}else{
el.style.display="none";
el.innerHTML=original;
}
});
}

// ===== KOMPLETNÍ CAS =====
const sekceCAS = [
{nazev:"Prostor řidiče a velitele", veci:[
"Držák na tablet + tablet","RDST Motorola (2x)","Termokamera","Vesta HASIČI / VELITEL"
]},
{nazev:"Prostor před lavicí", veci:[
"Zdravotnický batoh","Termokamery","RDST Motorola","Ruční svítilny"
]},
{nazev:"Levá přední", veci:[
"Elektrocentrála","Motorová pila Husqvarna","Rozbrušovací pila","Prodlužovačky"
]},
{nazev:"Pravá přední", veci:[
"Plovoucí čerpadlo","Zvedací vaky","Průmyslový vysavač","Přetlakový ventilátor"
]},
{nazev:"Levá prostřední", veci:[
"Hadice B, C, D","Rozdělovač","Proudnice"
]},
{nazev:"Pravá prostřední", veci:[
"Lezecké přepravky","Vakuová nosítka","Sorbční výbava"
]},
{nazev:"Levá zadní", veci:[
"VRVN","Sekery","PHP","Hydrantové klíče"
]},
{nazev:"Pravá zadní", veci:[
"Lednice","Mikrovlnka","Občerstvení"
]},
{nazev:"Prostor u čerpadla", veci:[
"Pěnotvorná proudnice","Hadice C","Klíče"
]},
{nazev:"Střecha", veci:[
"Žebřík","Savice","Stan","Lopaty"
]},
{nazev:"Lezecké vybavení", veci:[
"Postroj","Karabiny","Blokant","Lékárnička"
]},
{nazev:"Parametry", veci:[
"SCANIA","2021","324kW","4000L","110km/h"
]}
];

// ===== KOMPLETNÍ DA =====
const sekceDA = [
{nazev:"Prostor řidiče", veci:[
"Ovladač vrat","RDST GM360","Složka","Vesta"
]},
{nazev:"Pod sedadly", veci:[
"Zvedák","Křížový klíč","Měnič"
]},
{nazev:"Nad řidičem", veci:[
"Deka","Nosítka","Plachta","Dalekohled"
]},
{nazev:"Posádka", veci:[
"Lano","Pláštěnky","Občerstvení"
]},
{nazev:"Úložný prostor", veci:[
"Lopata","Sekera","VRVN","PG6"
]},
{nazev:"Hliníková bedna", veci:[
"Rukavice","Račna","Prodlužovačka"
]},
{nazev:"Střecha", veci:[
"Žebřík","Držák žebříku","Držák savic"
]}
];

</script>

</body>
</html>
