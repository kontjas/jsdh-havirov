.grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; padding:15px; }
.card { background:white; padding:20px; border-radius:15px; text-align:center; cursor:pointer; }
.back { margin:10px; padding:10px; background:#c62828; color:white; text-align:center; border-radius:10px; cursor:pointer; }
.search { margin:10px; padding:10px; width:calc(100% - 40px); border-radius:10px; border:none; }
.section { background:white; margin:10px; border-radius:10px; }
.section-header { padding:15px; font-weight:bold; cursor:pointer; background:#eee; }
.section-content { display:none; padding:10px; }
.item { padding:5px 0; }

.quick {
background:white;
margin:10px;
padding:15px;
border-radius:12px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
font-size:14px;
}
.quick div {
background:#f7f7f7;
padding:10px;

}

function showPage(p){

vozidla.style.display="none";
detail.style.display="none";
sluzby.style.display="none";

document.getElementById(p).style.display="block";

// ČAS + SMĚNY
function updateInfo(){
let now=new Date();
let time=now.toLocaleTimeString("cs-CZ");
let date=now.toLocaleDateString("cs-CZ");

let start=new Date(2024,0,1);
let diff=Math.floor((now-start)/(1000*60*60*24));
let smena=["A","B","C"][diff%3];

infoBox.innerHTML=`
<div style="font-size:18px;font-weight:bold;">${time}</div>
<div>${date}</div>
<hr>
<div style="font-size:20px;">🚒 Směna ${smena}</div>
`;
}
setInterval(updateInfo,1000);
updateInfo();

// OTEVŘENÍ HASIČŮM.CZ
function openHasicum(){

    let ua = navigator.userAgent || navigator.vendor || window.opera;

    // ===== iOS =====
    if (/iPhone|iPad|iPod/i.test(ua)) {

        let start = Date.now();

        // pokus otevřít appku
        window.location.href = "hasicum://";

        // fallback na App Store
        setTimeout(function(){
            if (Date.now() - start < 2000) {
                window.location.href = "https://apps.apple.com/cz/app/hasi%C4%8D%C5%AFm-cz/id1571187056";
            }
        }, 1500);
    }

    // ===== Android =====
    else if (/android/i.test(ua)) {

        let start = Date.now();

        // pokus otevřít appku
        window.location.href = "intent://#Intent;scheme=hasicum;package=cz.hasicum.app;end";

        // fallback na Google Play
        setTimeout(function(){
            if (Date.now() - start < 2000) {
                window.location.href = "https://play.google.com/store/apps/details?id=cz.hasicum.app";
            }
        }, 1500);
    }

    // ===== Ostatní (PC apod.) =====
    else {
        window.location.href = "https://www.hasicum.cz";
    }
}

// RENDER
function render(data,isCAS){
let html="";

if(isCAS){
html+=`
<div class="quick">
<div>💧 4000 L vody</div>
<div>🧯 250 L pěnidlo</div>
<div>⚡ 324 kW</div>
<div>🚛 SCANIA</div>
<div>📅 2021</div>
<div>🏎️ 110 km/h</div>
</div>`;
}else{
html+=`
<div class="quick">
<div>⚡ 88 kW</div>
<div>🔧 2.5 dCi</div>
<div>💪 320 Nm</div>
<div>🚛 3500 kg</div>
<div>📦 1460 kg</div>
<div>📏 L2 H2</div>
</div>`;
}

data.forEach((s,i)=>{
html+=`
<div class="section">
<div class="section-header" onclick="toggle(${i})">${s.nazev}</div>
<div class="section-content" id="sec${i}">
${s.veci.map(v=>`<div class="item">${v}</div>`).join("")}
</div>
</div>`;
});

content.innerHTML=html;
}

// OTEVŘENÍ VOZIDEL
function openCAS(){
showPage("detail");
title.innerText="CAS 20/4000/250 S2R - HKA 701";
render(sekceCAS,true);
}

function openDA(){
showPage("detail");
title.innerText="DA 12 Renault - HKA 700";
render(sekceDA,false);
}

// TOGGLE
function toggle(i){
let el=document.getElementById("sec"+i);
el.style.display=el.style.display==="block"?"none":"block";
}

// SEARCH
function normalizeText(text){
return text
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g, "");
}

function searchText(text){

let search = normalizeText(text);

document.querySelectorAll(".item").forEach(el => {

// uloží původní text jen jednou
if(!el.dataset.original){
el.dataset.original = el.textContent;
}

let original = el.dataset.original;
let normalized = normalizeText(original);

if(search === ""){
el.style.display = "block";
el.textContent = original;
return;
}

if(normalized.includes(search)){

el.style.display = "block";

// zvýraznění (bez rozbití iOS)
let regex = new RegExp(`(${text})`, "gi");

try{
el.innerHTML = original.replace(regex, `<span style="background:yellow;font-weight:bold;">$1</span>`);
}catch{
el.textContent = original;
}

// otevře sekci
let parent = el.closest(".section-content");
if(parent) parent.style.display = "block";

}else{
el.style.display = "none";
el.textContent = original;
}

});

}
